<!DOCTYPE html>
<html>
<head>
  <title>Theo Cloud 3-Tier App</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding-top: 100px;
    }

    .card {
      background: #1e293b;
      width: 500px;
      margin: auto;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 15px 25px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #0ea5e9;
    }

    #result {
      margin-top: 25px;
      font-size: 18px;
      color: #4ade80;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Azure 3-Tier Cloud Project</h1>

    <p>Frontend + Backend API + Azure SQL</p>

    <button onclick="testDB()">Test Database Connection</button>

    <div id="result"></div>
  </div>

  <script>
    async function testDB() {
      const response = await fetch(
        'https://api-3tier-theo-cehuejd7gnbxc5g0.centralus-01.azurewebsites.net/db'
      );

      const data = await response.json();

      document.getElementById('result').innerText =
        data[0].Name;
    }
  </script>
<h2>Admin Login</h2>

<form id="loginForm">
  <input type="text" id="username" placeholder="Username" required>
  <br><br>

  <input type="password" id="password" placeholder="Password" required>
  <br><br>

  <button type="submit">Login</button>
</form>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    await fetch('https://api-3tier-theo-cehuejd7gnbxc5g0.centralus-01.azurewebsites.net/admin-login', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            username,
            password
        })
    });

    alert('Invalid credentials');
});
</script>
</body>
</html>
